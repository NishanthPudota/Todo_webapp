<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Todo App{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f8f9fa; }

    .navbar-brand { font-weight: 700; letter-spacing: 1px; }

    .card { border: none; box-shadow: 0 2px 8px rgba(0,0,0,0.08); border-radius: 10px; }

    /* Priority badge colours */
    .badge-p  { color: #fff; padding: 4px 10px; border-radius: 20px; font-size: .75rem; }
    .badge-P1  { background-color: #dc3545; }
    .badge-P2  { background-color: #fd7e14; }
    .badge-P3  { background-color: #0d6efd; }
    .badge-P4  { background-color: #6c757d; }
    .badge-P5  { background-color: #adb5bd; color: #212529 !important; }
    .badge-EOD { background-color: #6f42c1; }

    /* Strike-through completed tasks */
    .task-done td { opacity: 0.5; text-decoration: line-through; }

    .table th { white-space: nowrap; }

    /* Orange — used for 5–10 min remaining warning (not in Bootstrap by default) */
    .text-orange { color: #fd7e14 !important; }

    /* Pulse animation applied to the timer cell when time is up */
    @keyframes pulse-red {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.45; }
    }
    .time-up-pulse { animation: pulse-red 1s ease-in-out infinite; }
  </style>
</head>
<body>

<!-- ── Navbar ──────────────────────────────────────────────────────────────── -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
  <div class="container">
    <a class="navbar-brand" href="/">📝 Todo App</a>
    <div class="ms-auto d-flex align-items-center gap-2">
      {% if current_user %}
        <span class="text-light">👤 {{ current_user }}</span>
        <a href="/logout" class="btn btn-outline-light btn-sm">Logout</a>
      {% else %}
        <a href="/login"  class="btn btn-outline-light btn-sm">Login</a>
        <a href="/signup" class="btn btn-light btn-sm">Sign Up</a>
      {% endif %}
    </div>
  </div>
</nav>

<!-- ── Flash messages ─────────────────────────────────────────────────────── -->
<div class="container">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
        {{ message }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
    {% endfor %}
  {% endwith %}

  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
